<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/scripts/main.js"></script>
    <title>proyecto-final-n1</title>
  </head>
  <body>
    <a href="./windbnb_checklist_tailwind.html">Checklist</a>

    <header class="flex flex-col">
      <img
        class="w-35 mb-10"
        src="./src/images/icons/logo-f7862584.svg"
        alt="logo"
      />
<!-- Hidden menu for filters -->
      <section class="flex flex-col hidden">
        <div class="flex justify-between px-5">
          <h2>Edit your search</h2>
          <button>✖️</button>
        </div>
        <div>
          <div class="flex flex-col">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" />
          </div>
          <div class="flex flex-col">
            <label for="guests">Guests</label>
            <input type="text" id="guests" name="guests" />
          </div>
        </div>

        <section class="gap-4">
          <div>
            <h2>Adults</h2>
            <p>Ages 13 or above</p>
            <button>-</button>
            <span>0</span>
            <button>+</button>
          </div>
          <div>
            <h2>Children</h2>
            <p>Ages below 13</p>
            <button>-</button>
            <span>0</span>
            <button>+</button>
          </div>
        </section>
        <button>🔍 search</button>
      </section>
      <section
        id="search-bar"
        class="flex border w-8/10 rounded-xl justify-center items-center gap-5"
      >
        <button class="border w-1/3 py-5">Add location</button>
        <button class="border w-1/3 py-5">Add guests</button>
        <img
          class="h-5 px-5"
          src="./src/images/icons/search.svg"
          alt="search"
        />
      </section>

      <main class="flex flex-col justify-between px-5">
        <div class="flex justify-between ">
          <h1>Stays in Finland</h1>
          <span>12+ stays</span>
        </div>

        <section id="card-container">
          <!-- 
          img
          greyd span description
          rate ⭐ 4.4 svg
          Highlights p
            -->
        </section>
      </main>
    </header>
  </body>
</html>
