<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/scripts/main.js"></script>
    <title>proyecto-final-n1</title>
  </head>
  <body>
    <a href="./windbnb_checklist_tailwind.html">Checklist</a>

    <header class="flex flex-col">
      <img
        class="w-35 mb-5"
        src="./src/images/icons/logo-f7862584.svg"
        alt="logo"
      />
      <!-- Hidden menu for filters -->
      <section id="menu" class="absolute h-180 w-full bg-white px-5">
        <div class="flex justify-between">
          <h2 class="font-semibold text-sm">Edit your search</h2>
          <button id="cierra-modal">✖️</button>
        </div>
        <div class="shadow-md border-gray-600 rounded-2xl overflow-hidden py-2 mb-8">
          <div class="flex flex-col px-3 font-medium text-slate-700">
            <label class="text-xs " for="location">LOCATION</label>
            <input id="location-input" class="text-sm pb-2 " type="text" id="location" name="location"
            autocomplete="off"
            placeholder="Ej. Helsinki" />
            <ul id="dropdown-ciudades" class="absolute left-0 top-full w-full bg-white border border-gray-200 shadow-lg hidden z-50 max-h-40 overflow-y-auto"></ul>
          </div>
          <div class="flex flex-col border-t border-gray-200 px-3 font-medium text-slate-700">
            <label class="text-xs py-2 " for="guests">GUESTS</label>
            <div id="guests-result" class=" relative">
              <p><span>Add guests</span></p>
            </div>
          </div>
        </div>

        <section class="gap-4">
          <div class="mb-10 gap-5">
            <h2 class="text-base font-bold">Adults</h2>
            <p class="text-sm text-[#c1c1bf]">Ages 13 or above</p>
            <div id="botonesAdultos">
              <button  class=" menos border-slate-700 bg-gray-100  px-2 border rounded">-</button>
              <span id="valorAdultos" class="mx-6 font-bold">0</span>
              <button class="mas border-slate-700 bg-gray-100  px-1.5 border rounded">+</button>
            </div>
          </div>
          <div class="mb-75 gap-5">
            <h2 class="text-base font-bold">Children</h2>
            <p class=" text-sm text-[#c1c1bf]">Ages below 13</p>
            <div id="botonesChildren">
              <button class="menos border-slate-700 bg-gray-100  px-2 border rounded">-</button>
              <span id="valorChildren" class=" mx-6 font-bold">0</span>
              <button class="mas border-slate-700 bg-gray-100 px-1.5 border rounded">+</button>
            </div>
          </div>
        </section>
        <button id="btn-search-modal" class="flex justify-center items-center rounded-2xl border text-white bg-red-400 py-2 px-8 left-35 relative"> 
          <svg
            class="h-5 w-5 mr-1 stroke-white fill-none"
            xmlns="http://www.w3.org/2000/svg" 
            viewBox="0 0 24 24"
            stroke-width="2"
          > 
            <circle cx="11" cy="11" r="6"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg><span>search</span></button>
      </section>
      <section
        id="search-bar"
        class="flex w-11/12 mx-auto my-6 rounded-2xl  border border-gray-100 shadow-md overflow-hidden cursor-pointer justify-center items-center gap-5"
      >
        <button class=" w-2/5 py-5 px-4 text-md text-left text-gray-400 border-r border-gray-100 truncate">Add location</button>
        <button class=" w-2/5 py-5 px-4 text-left text-md text-gray-400 border-r border-gray-100 truncate">Add guests</button>
        <button class="w-1/15 flex justify-center items-center py-5">
          <img
            class="h-5 pr-2 text-red-500"
            src="./src/images/icons/search.svg"
            alt="search"
          />
        </button>
      </section>
      </header>

      <main id="contenedor-main" class="flex flex-col justify-between px-5">
        <div class="my-10 flex justify-between items-center">
          <h1 class="text-2xl font-bold">Stays in Finland</h1>
          <span class="text-md">12+ stays</span>
        </div>

        <section id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
          <!-- 
          img
          greyd span description
          rate ⭐ 4.4 svg
          Highlights p
            -->
        </section>
      </main>
    
  </body>
</html>
